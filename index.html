<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        line-height: 1.6;
        background: #f6f8fa;
        color: #24292f;
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
        padding: 32px;
      }

      h1,
      h2 {
        margin-top: 0;
      }

      .muted {
        color: #57606a;
      }

      ul {
        padding-left: 20px;
      }

      a {
        color: #0969da;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        .container {
          padding: 24px 12px;
        }

        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>你好，我是你的名字</h1>
        <p class="muted">欢迎来到我的个人主页。</p>

        <h2>关于我</h2>
        <p>我热爱技术与创作，正在持续学习并构建有价值的项目。</p>

        <h2>技能</h2>
        <ul>
          <li>前端开发：HTML / CSS / JavaScript</li>
          <li>后端开发：Node.js（可按需替换）</li>
          <li>工具：Git / GitHub</li>
        </ul>

        <h2>项目</h2>
        <ul>
          <li>项目 A：简短描述你的项目亮点</li>
          <li>项目 B：简短描述你的项目亮点</li>
        </ul>

        <h2>联系方式</h2>
        <p>
          邮箱：<a href="mailto:you@example.com">you@example.com</a>
        </p>
      </section>
    </main>
  </body>
</html>
