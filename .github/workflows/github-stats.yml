name: Generate GitHub Stats Card

on:
  schedule:
    - cron: "0 */12 * * *" # 每 12 小时自动更新一次
  workflow_dispatch: # 允许在 Actions 页面手动运行

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate GitHub Stats
        uses: jstrieb/github-stats@v1
        with:
          token: ${{ secrets.PAT }}
